name: tglpbot

services:
  mysql:
    image: mysql:5.7
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${COMPOSE_MYSQL_ROOT_PASSWORD:-tglpbot_dev_password}
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: ${COMPOSE_MYSQL_DATABASE:-tglpbot}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD}" ]; then
          exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
        fi
        exec redis-server --appendonly yes
    environment:
      REDIS_PASSWORD: ${COMPOSE_REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: ${COMPOSE_MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${COMPOSE_MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./data/minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${COMPOSE_MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${COMPOSE_MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_AVATAR_BUCKET: ${COMPOSE_MINIO_AVATAR_BUCKET:-avatar}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        mc mb --ignore-existing "local/$${MINIO_AVATAR_BUCKET}"
        mc anonymous set download "local/$${MINIO_AVATAR_BUCKET}"
    restart: "no"
