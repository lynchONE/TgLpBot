<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BSC RPC 抓取器</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <div class="eyebrow">Chrome Extension</div>
          <h1>BSC RPC 抓取器</h1>
        </div>
        <div class="meta" id="currentTabLabel">正在读取当前页面…</div>
      </header>

      <section class="panel stats-panel">
        <div class="stat-card">
          <span class="stat-label">已抓到</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">确认可用</span>
          <strong id="usableCount">0</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">最近更新</span>
          <strong id="updatedAt">-</strong>
        </div>
      </section>

      <section class="panel">
        <div class="action-row">
          <button id="reloadTabBtn">重载当前页</button>
          <button id="revalidateAllBtn">重新校验</button>
          <button id="copyBtn">复制可用结果</button>
          <button id="exportBtn">导出 JSON</button>
          <button id="clearBtn" class="danger">清空记录</button>
        </div>
        <p class="hint">
          只有通过 <code>eth_chainId</code> 和 <code>eth_blockNumber</code> 校验、且链 ID 为
          <code>56</code> 的端点，才会进入“确认可用”结果。
        </p>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>确认可用输出</h2>
          <span class="tag" id="usableTag">0 个</span>
        </div>
        <textarea id="usableOutput" readonly></textarea>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>抓包明细</h2>
          <span class="tag neutral" id="listTag">0 条</span>
        </div>
        <div id="endpointList" class="endpoint-list">
          <div class="empty-state">打开目标网页并产生链上请求后，这里会出现捕获结果。</div>
        </div>
      </section>
    </div>

    <template id="endpointTemplate">
      <article class="endpoint-card">
        <div class="endpoint-top">
          <span class="status-pill"></span>
          <button class="small ghost revalidate-btn">重新校验</button>
        </div>
        <div class="endpoint-url"></div>
        <div class="endpoint-meta"></div>
        <div class="endpoint-details"></div>
        <div class="endpoint-footer">
          <button class="small copy-endpoint-btn">复制 URL</button>
        </div>
      </article>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
